services:
  web:
    build: .
    container_name: calculator_web
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/calculatorDB
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: calculator_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
